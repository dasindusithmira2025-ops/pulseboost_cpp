name: Bug report
description: Report a reproducible PulseBoost defect.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a defect. Include enough detail for the issue to be reproduced safely.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List exact steps, commands, and screens.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version/build
      placeholder: "Windows 11 23H2, build 22631"
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      render: shell
