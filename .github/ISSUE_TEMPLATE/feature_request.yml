name: Feature request
description: Propose a safe, auditable PulseBoost feature.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the behavior, UI, safety gates, and rollback expectations.
    validations:
      required: true
  - type: dropdown
    id: risk
    attributes:
      label: Risk level
      options:
        - Read-only
        - Temporary reversible change
        - Persistent reversible change
        - Requires expert-mode confirmation
    validations:
      required: true
