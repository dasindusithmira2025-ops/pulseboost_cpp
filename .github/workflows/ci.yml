name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend tests
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pulseboost/requirements.txt

      - name: Install Python dependencies
        run: python -m pip install -r pulseboost/requirements.txt

      - name: Compile backend
        run: python -m compileall pulseboost/api pulseboost/core pulseboost/tests

      - name: Run unit tests
        run: python -m unittest discover -s pulseboost/tests

  frontend:
    name: Frontend build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: pulseboost/ui/package-lock.json

      - name: Install frontend dependencies
        working-directory: pulseboost/ui
        run: npm ci

      - name: Build frontend
        working-directory: pulseboost/ui
        run: npm run build

      - name: Validate desktop entry points
        working-directory: pulseboost/ui
        run: npm run desktop:check
